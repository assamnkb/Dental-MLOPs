<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DentaBot — AI Dental Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal-50: #E1F5EE;
    --teal-100: #9FE1CB;
    --teal-400: #1D9E75;
    --teal-600: #0F6E56;
    --teal-800: #085041;
    --teal-900: #04342C;
    --white: #FFFFFF;
    --gray-50: #F7F6F2;
    --gray-100: #EDEDEA;
    --gray-300: #C5C3BA;
    --gray-500: #888780;
    --gray-700: #444441;
    --gray-900: #1A1A18;
    --radius-sm: 8px;
    --radius-md: 14px;
    --radius-lg: 22px;
    --radius-xl: 32px;
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.07);
    --shadow-md: 0 4px 20px rgba(0,0,0,0.10);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.13);
  }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--gray-50);
    color: var(--gray-900);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 10% 10%, rgba(29,158,117,0.10) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 90% 90%, rgba(15,110,86,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .page-wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    height: 100vh;
    max-height: 760px;
    display: flex;
    flex-direction: column;
    background: var(--white);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-lg), 0 0 0 1px rgba(0,0,0,0.05);
    overflow: hidden;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, var(--teal-800) 0%, var(--teal-600) 100%);
    padding: 18px 20px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .header-logo {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(255,255,255,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .header-logo svg { width: 26px; height: 26px; }

  .header-info { flex: 1; }

  .header-name {
    font-family: 'DM Serif Display', serif;
    font-size: 19px;
    color: var(--white);
    letter-spacing: 0.01em;
    line-height: 1.1;
  }

  .header-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.70);
    margin-top: 2px;
    font-weight: 300;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 20px;
    padding: 4px 11px;
    font-size: 11px;
    color: rgba(255,255,255,0.85);
    font-weight: 500;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #7EF8C4;
    box-shadow: 0 0 6px rgba(126,248,196,0.8);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* DISCLAIMER BANNER */
  .disclaimer {
    background: #FFF8E1;
    border-bottom: 1px solid #FFE082;
    padding: 8px 16px;
    font-size: 11.5px;
    color: #7B5E00;
    line-height: 1.5;
    text-align: center;
    flex-shrink: 0;
  }

  /* MESSAGES AREA */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px 10px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 4px; }

  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    animation: fadeUp 0.25s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-row.bot { justify-content: flex-start; }
  .msg-row.user { justify-content: flex-end; }

  .bot-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--teal-50);
    border: 1px solid var(--teal-100);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-bottom: 2px;
  }

  .bot-avatar svg { width: 16px; height: 16px; }

  .msg-group { display: flex; flex-direction: column; gap: 3px; max-width: 78%; }
  .msg-row.user .msg-group { align-items: flex-end; }

  .bubble {
    padding: 11px 15px;
    font-size: 14px;
    line-height: 1.6;
    border-radius: var(--radius-md);
    word-break: break-word;
  }

  .msg-row.bot .bubble {
    background: var(--gray-50);
    color: var(--gray-900);
    border: 1px solid var(--gray-100);
    border-bottom-left-radius: 4px;
  }

  .msg-row.user .bubble {
    background: linear-gradient(135deg, var(--teal-600) 0%, var(--teal-800) 100%);
    color: var(--white);
    border-bottom-right-radius: 4px;
  }

  .msg-time {
    font-size: 10.5px;
    color: var(--gray-500);
    padding: 0 4px;
  }

  /* TYPING */
  .typing-dots {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 13px 16px;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--gray-300);
    animation: blink 1.3s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.18s; }
  .dot:nth-child(3) { animation-delay: 0.36s; }

  @keyframes blink {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* QUICK SUGGESTIONS */
  .quick-wrap {
    padding: 6px 14px 4px;
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    flex-shrink: 0;
  }

  .qbtn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 13px;
    border-radius: 20px;
    border: 1px solid var(--teal-100);
    background: var(--teal-50);
    color: var(--teal-800);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .qbtn:hover {
    background: var(--teal-100);
    border-color: var(--teal-400);
    transform: translateY(-1px);
  }

  /* INPUT BAR */
  .input-bar {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    padding: 12px 14px 16px;
    border-top: 1px solid var(--gray-100);
    background: var(--white);
    flex-shrink: 0;
  }

  #user-input {
    flex: 1;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 15px;
    border: 1.5px solid var(--gray-100);
    border-radius: var(--radius-lg);
    background: var(--gray-50);
    color: var(--gray-900);
    resize: none;
    overflow-y: hidden;
    min-height: 42px;
    max-height: 120px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.5;
  }

  #user-input::placeholder { color: var(--gray-300); }
  #user-input:focus { border-color: var(--teal-400); background: var(--white); }

  #send-btn {
    width: 42px;
    height: 42px;
    flex-shrink: 0;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--teal-400) 0%, var(--teal-800) 100%);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, opacity 0.15s;
    box-shadow: 0 2px 10px rgba(15,110,86,0.35);
  }

  #send-btn:hover { transform: scale(1.08); }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
  #send-btn svg { width: 18px; height: 18px; }

  /* FOOTER */
  .footer {
    text-align: center;
    font-size: 10.5px;
    color: var(--gray-500);
    padding: 0 14px 12px;
    flex-shrink: 0;
  }

  .footer a { color: var(--teal-600); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }

  @media (max-width: 520px) {
    .page-wrap { border-radius: 0; max-height: 100vh; }
    body { align-items: flex-start; }
  }
</style>
</head>
<body>

<div class="page-wrap">

  <div class="header">
    <div class="header-logo">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 3C10 3 6 6 6 10c0 2.2.9 4 1.8 5.8.8 1.6 1.2 3.2 1.2 5 0 1.6.7 2.8 1.8 2.8.8 0 1.4-.6 1.7-1.4C13 21 13.5 19 14 19s1 2 1.5 3.2c.3.8.9 1.4 1.7 1.4 1.1 0 1.8-1.2 1.8-2.8 0-1.8.4-3.4 1.2-5C21.1 14 22 12.2 22 10c0-4-4-7-8-7z" fill="rgba(255,255,255,0.9)"/>
        <circle cx="11" cy="10" r="1.2" fill="rgba(15,110,86,0.5)"/>
        <circle cx="17" cy="10" r="1.2" fill="rgba(15,110,86,0.5)"/>
      </svg>
    </div>
    <div class="header-info">
      <div class="header-name">DentaBot</div>
      <div class="header-sub">AI-Powered Dental Assistant</div>
    </div>
    <div class="status-pill">
      <div class="status-dot"></div>
      Online
    </div>
  </div>

  <div class="disclaimer">
    ⚠️ For informational purposes only — not a substitute for professional dental advice.
  </div>

  <div id="messages"></div>

  <div class="quick-wrap" id="quick-wrap">
    <button class="qbtn" onclick="sendQuick('What causes tooth sensitivity?')">Tooth sensitivity</button>
    <button class="qbtn" onclick="sendQuick('How do I relieve a toothache at home?')">Toothache relief</button>
    <button class="qbtn" onclick="sendQuick('How often should I brush my teeth?')">Brushing tips</button>
    <button class="qbtn" onclick="sendQuick('What are signs of gum disease?')">Gum disease</button>
    <button class="qbtn" onclick="sendQuick('What is a root canal?')">Root canal</button>
    <button class="qbtn" onclick="sendQuick('How do I whiten my teeth safely?')">Teeth whitening</button>
  </div>

  <div class="input-bar">
    <textarea id="user-input" placeholder="Ask a dental question…" rows="1"></textarea>
    <button id="send-btn" onclick="handleSend()" title="Send">
      <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 10L17 3L12 17L10 11.5L3 10Z" fill="white" stroke="white" stroke-width="0.5" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <div class="footer">
    Need more help? Call <a href="tel:4093345673">Dr. Brandon Jaques, DDS — 409-334-5673</a>
  </div>

</div>

<script>
  const GEMINI_API_KEY=AIzaSyBK31HtqAw_PnzKOo7s3YdevX93Q9hE_QI; // Replace with your key or use a backend proxy

  const SYSTEM_PROMPT = `You are DentaBot, a specialized AI dental assistant built for a USA-based dental practice.

Your ONLY purpose is to answer questions strictly related to teeth, gums, mouth, oral health, dental procedures, and dentistry. If a question is unrelated to dental or oral health, politely decline and redirect the user.

STRICT RULES:
1. Respond in 1–2 sentences MAXIMUM. Be concise, warm, and professional.
2. NEVER answer questions outside of dental/oral health.
3. NEVER hallucinate clinical facts, statistics, or treatment outcomes.
4. NEVER estimate treatment costs, insurance penalties, or legal outcomes — even if you think they are correct.
5. Do NOT diagnose — you may describe common causes or symptoms but always recommend professional evaluation.
6. Base answers on general USA dental health guidelines and public dental health knowledge.
7. If the user seems confused, frustrated, or unsatisfied after your response, append this line: "For personalized care, please contact Dr. Brandon Jaques, Dental Surgeon, at 409-334-5673."
8. Never discuss yourself as an AI beyond what is necessary — stay focused on being a helpful dental resource.`;

  let history = [];
  let isLoading = false;

  function getTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function scrollToBottom() {
    const msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addMessage(text, role) {
    const msgs = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'msg-row ' + role;

    if (role === 'bot') {
      const avatar = document.createElement('div');
      avatar.className = 'bot-avatar';
      avatar.innerHTML = `<svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 3C10 3 6 6 6 10c0 2.2.9 4 1.8 5.8.8 1.6 1.2 3.2 1.2 5 0 1.6.7 2.8 1.8 2.8.8 0 1.4-.6 1.7-1.4C13 21 13.5 19 14 19s1 2 1.5 3.2c.3.8.9 1.4 1.7 1.4 1.1 0 1.8-1.2 1.8-2.8 0-1.8.4-3.4 1.2-5C21.1 14 22 12.2 22 10c0-4-4-7-8-7z" fill="#1D9E75"/>
      </svg>`;
      row.appendChild(avatar);
    }

    const group = document.createElement('div');
    group.className = 'msg-group';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = getTime();

    group.appendChild(bubble);
    group.appendChild(time);
    row.appendChild(group);
    msgs.appendChild(row);
    scrollToBottom();
    return row;
  }

  function showTyping() {
    const msgs = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.id = 'typing-row';

    const avatar = document.createElement('div');
    avatar.className = 'bot-avatar';
    avatar.innerHTML = `<svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M14 3C10 3 6 6 6 10c0 2.2.9 4 1.8 5.8.8 1.6 1.2 3.2 1.2 5 0 1.6.7 2.8 1.8 2.8.8 0 1.4-.6 1.7-1.4C13 21 13.5 19 14 19s1 2 1.5 3.2c.3.8.9 1.4 1.7 1.4 1.1 0 1.8-1.2 1.8-2.8 0-1.8.4-3.4 1.2-5C21.1 14 22 12.2 22 10c0-4-4-7-8-7z" fill="#1D9E75"/>
    </svg>`;
    row.appendChild(avatar);

    const group = document.createElement('div');
    group.className = 'msg-group';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    group.appendChild(bubble);
    row.appendChild(group);
    msgs.appendChild(row);
    scrollToBottom();
  }

  function removeTyping() {
    const t = document.getElementById('typing-row');
    if (t) t.remove();
  }

  async function callAPI(userText) {
    history.push({ role: 'user', content: userText });

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ANTHROPIC_API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 300,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    const data = await response.json();
    const reply = data?.content?.[0]?.text || "I'm having trouble connecting. Please try again.";
    history.push({ role: 'assistant', content: reply });
    return reply;
  }

  async function handleSend() {
    if (isLoading) return;
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('quick-wrap').style.display = 'none';

    addMessage(text, 'user');
    isLoading = true;
    document.getElementById('send-btn').disabled = true;
    showTyping();

    try {
      const reply = await callAPI(text);
      removeTyping();
      addMessage(reply, 'bot');
    } catch (err) {
      removeTyping();
      addMessage("Connection error. Please check your setup and try again.", 'bot');
      console.error(err);
    }

    isLoading = false;
    document.getElementById('send-btn').disabled = false;
  }

  function sendQuick(text) {
    document.getElementById('user-input').value = text;
    handleSend();
  }

  // Auto-resize textarea
  document.getElementById('user-input').addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  document.getElementById('user-input').addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  });

  // Initial greeting
  window.addEventListener('DOMContentLoaded', () => {
    addMessage("Hello! I'm DentaBot, your dental health assistant. Ask me anything about teeth, gums, oral hygiene, or dental procedures — I'm here to help.", 'bot');
  });
</script>
</body>
</html>
